<script>
    const LOADING_CLASS_CSS = 'active';
    const AUTOSAVE_KEY = 'gift_editor_autosave';

    const sampleMap = {
        'DESC': '::Instructions::\nYou can use your pencil and paper for these next math questions.',
        'TF': 'The sun rises in the east.{T}',
        'TFF': '//True or false with feedback\nGrant is buried in Grant\'s tomb.{FALSE#wrong answer feedback#right answer feedback}',
        'MC': '// multiple choice with specific feedback\n::Q2:: What\'s between orange and green in the spectrum?\n{=yellow # correct! ~red # wrong, it\'s yellow ~blue # wrong, it\'s yellow}',
        'MCMA': '// multiple choice with multiple correct answers, different weights(checkbox)\nWhat two people are entombed in Grant\'s tomb? {\n~%-100%No one\n~%50%Grant # yup its good\n~%50%Grant\'s wife\n ~%-100%Grant\'s father\n}',
        'NMS': '// Numerical question\n::Numerical question::\nWhat\'s two plus four?\n{#\n=%100%6:0#Good job it IS 6!\n}',
        'NM': '//Custom Validation not yet supported\nWhat is the value of pi (to 3 decimal places)? {#3.1415:0.0005}.',
        'SA': 'Two plus two equals {=four =4}',
        'MATCH': 'Match the following countries with their corresponding capitals. {\n=Canada -> Ottawa\n=Italy  -> Rome\n=Japan  -> Tokyo\n=India  -> New Delhi\n}',
        'ES': 'Write a short biography of Dag Hammarskjöld. {}',
        'CAT': '$CATEGORY: My Category'
    };

    const typeIcons = {
        'TF': '✓✗',
        'MC': '◉',
        'Essay': '✎',
        'Matching': '↔',
        'Short': 'Aa',
        'Numerical': '#',
        'Description': '§'
    };

    document.addEventListener('DOMContentLoaded', () => {
        const giftCode = document.getElementById('gift-code');
        const addSampleBtn = document.getElementById('add-sample');
        const createGiftBtn = document.getElementById('create-gift');
        const appendGiftBtn = document.getElementById('append-gift');
        const uploadBtn = document.getElementById('upload-gift');
        const downloadBtn = document.getElementById('download-gift');
        const fileInput = document.getElementById('file-input');

        // Restore autosaved content if the textarea is at default
        const saved = localStorage.getItem(AUTOSAVE_KEY);
        if (saved && giftCode.value === giftCode.defaultValue) {
            giftCode.value = saved;
        }

        // Initial validation
        if (giftCode.value.trim()) {
            validateGIFT();
        }

        addSampleBtn.addEventListener('click', () => {
            const e = document.getElementById('sample');
            const chosenSampleKey = e.options[e.selectedIndex].value;
            giftCode.value += '\n\n' + sampleMap[chosenSampleKey] + '\n\n';
            autosave();
            validateGIFT();
        });

        createGiftBtn.addEventListener('click', () => submitFormToAppsScript(false));
        appendGiftBtn.addEventListener('click', () => submitFormToAppsScript(true));

        // File upload
        uploadBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                giftCode.value = e.target.result;
                autosave();
                validateGIFT();
            };
            reader.readAsText(file);
            fileInput.value = ''; // Reset so same file can be re-uploaded
        });

        // File download
        downloadBtn.addEventListener('click', () => {
            const text = giftCode.value;
            const blob = new Blob([text], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'questions.gift';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
        });

        // Typing handler with autosave and debounced validation
        let typingTimer;
        const doneTypingInterval = 800;

        giftCode.addEventListener('input', () => {
            autosave();
            clearTimeout(typingTimer);
            if (giftCode.value.trim()) {
                typingTimer = setTimeout(validateGIFT, doneTypingInterval);
            } else {
                clearAlerts();
                updatePreview([]);
            }
        });
    });

    function autosave() {
        try {
            localStorage.setItem(AUTOSAVE_KEY, document.getElementById('gift-code').value);
        } catch (e) {
            // localStorage might be unavailable in some contexts
        }
    }

    function submitFormToAppsScript(append) {
        clearAlerts();
        showAlert('info', 'Processing GIFT...');

        const createGiftBtn = document.getElementById('create-gift');
        const appendGiftBtn = document.getElementById('append-gift');
        const loadingDiv = document.getElementById('loading');
        const giftCode = document.getElementById('gift-code').value;

        createGiftBtn.disabled = true;
        appendGiftBtn.disabled = true;
        loadingDiv.classList.add(LOADING_CLASS_CSS);

        google.script.run
            .withSuccessHandler((msg) => {
                createGiftBtn.disabled = false;
                appendGiftBtn.disabled = false;
                clearAlerts();
                loadingDiv.classList.remove(LOADING_CLASS_CSS);
                showAlert('success', msg);
            })
            .withFailureHandler((err) => {
                createGiftBtn.disabled = false;
                appendGiftBtn.disabled = false;
                clearAlerts();
                loadingDiv.classList.remove(LOADING_CLASS_CSS);
                showAlert('error', typeof err === 'object' ? err.message : err.toString());
            })
            .createForm(giftCode, append);
    }

    function clearAlerts() {
        const existing = document.getElementById('error');
        if (existing) existing.remove();
    }

    function showAlert(msgClass, msg) {
        clearAlerts();
        const buttonBar = document.getElementById('button-bar');
        const div = document.createElement('div');
        div.id = 'error';
        div.className = msgClass;
        div.innerHTML = msg;
        buttonBar.parentNode.insertBefore(div, buttonBar.nextSibling);
    }

    function validateGIFT() {
        clearAlerts();
        const giftText = document.getElementById('gift-code').value;

        try {
            // Remove $CATEGORY lines before parsing
            const cleanText = giftText.replace(/^\$CATEGORY:.*$/gm, '').trim();
            if (!cleanText) {
                updatePreview([]);
                return;
            }
            const output = giftParser.parse(cleanText);
            clearAlerts();
            showAlert('success', `Recognized ${output.length} question${output.length === 1 ? '' : 's'}.`);
            updatePreview(output);
        } catch (e) {
            clearAlerts();
            showAlert('error', buildErrorMessage(giftText, e));
            updatePreview([]);
        }
    }

    function updatePreview(questions) {
        const preview = document.getElementById('question-preview');
        if (!questions || questions.length === 0) {
            preview.innerHTML = '<div class="preview-empty">No questions parsed yet.</div>';
            return;
        }

        let html = '';
        for (let i = 0; i < questions.length; i++) {
            const q = questions[i];
            const icon = typeIcons[q.type] || '?';
            const stem = truncate(stripPreviewHTML(q.stem ? q.stem.text : ''), 60);
            const title = q.title ? truncate(q.title, 40) : null;
            html += '<div class="preview-item">' +
                '<span class="preview-num">' + (i + 1) + '.</span>' +
                '<span class="preview-icon">' + escapeHtml(icon) + '</span>' +
                '<span class="preview-type">' + escapeHtml(q.type) + '</span>' +
                '<span class="preview-title">' +
                    (title ? escapeHtml(title) + (stem ? ' <span class="preview-stem">— ' + escapeHtml(stem) + '</span>' : '') : escapeHtml(stem)) +
                '</span>' +
                '</div>';
        }
        preview.innerHTML = html;
    }

    function truncate(str, len) {
        if (!str) return '';
        return str.length > len ? str.substring(0, len) + '…' : str;
    }

    function stripPreviewHTML(str) {
        return (str || '').replace(/<(?:.|\n)*?>/gm, '');
    }

    function escapeHtml(unsafe) {
        return (unsafe || '').toString()
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function buildErrorMessage(giftStr, err) {
        if (!err.location) return escapeHtml(err.message || err.toString());

        const delta = 10;
        const startOffset = err.location.start.offset;
        const endOffset = err.location.end.offset;

        let paddingBefore = "";
        let paddingAfter = "";

        if (startOffset - delta > 0) {
            paddingBefore = giftStr.substring(startOffset - delta, startOffset);
        } else {
            paddingBefore = giftStr.substring(0, startOffset);
        }

        if (endOffset + delta < giftStr.length) {
            paddingAfter = giftStr.substring(endOffset + 1, endOffset + 1 + delta);
        } else {
            paddingAfter = giftStr.substring(endOffset + 1);
        }

        const badStr = giftStr.substring(startOffset, endOffset + 1);
        const badGIFT = escapeHtml(paddingBefore) + "<u>" + escapeHtml(badStr) + "</u>" + escapeHtml(paddingAfter);

        return "Line " + err.location.start.line + ", column " + err.location.start.column +
            " near: <b>" + badGIFT + "</b><br>" + escapeHtml(err.message);
    }
</script>
